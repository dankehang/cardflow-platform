<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长沙市医学检验招聘监测系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="client/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-stethoscope"></i>
                <span>医学检验招聘监测</span>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-value" id="total-count">0</span>
                    <span class="stat-label">总职位数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="today-count">0</span>
                    <span class="stat-label">今日新增</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索职位名称或公司...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="filters">
                <select id="source-filter">
                    <option value="all">全部来源</option>
                    <option value="智联招聘">智联招聘</option>
                    <option value="前程无忧">前程无忧</option>
                    <option value="Boss直聘">Boss直聘</option>
                </select>
                <select id="salary-filter">
                    <option value="all">全部薪资</option>
                    <option value="low">5k以下</option>
                    <option value="medium">5k-10k</option>
                    <option value="high">10k以上</option>
                </select>
            </div>
        </div>

        <div class="stats-section">
            <h2>数据统计</h2>
            <div class="stats-grid" id="source-stats">
            </div>
        </div>

        <div class="jobs-section">
            <div class="section-header">
                <h2>最新职位</h2>
                <div class="header-buttons">
                    <button id="add-job-btn" class="btn-success">
                        <i class="fas fa-plus"></i> 添加职位
                    </button>
                    <button id="refresh-btn" class="btn-primary">
                        <i class="fas fa-refresh"></i> 手动刷新
                    </button>
                </div>
            </div>
            <div class="jobs-list" id="jobs-list">
            </div>
            <div class="pagination" id="pagination">
            </div>
        </div>
    </main>

    <div class="modal" id="job-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">职位详情</h2>
            <div id="modal-body">
            </div>
        </div>
    </div>

    <div class="modal" id="add-job-modal">
        <div class="modal-content modal-large">
            <span class="close-modal">&times;</span>
            <h2><i class="fas fa-plus-circle"></i> 添加新职位</h2>
            <form id="add-job-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>* 职位标题</label>
                        <input type="text" id="job-title" required>
                    </div>
                    <div class="form-group">
                        <label>* 公司名称</label>
                        <input type="text" id="job-company" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>工作地点</label>
                        <input type="text" id="job-location" placeholder="长沙">
                    </div>
                    <div class="form-group">
                        <label>薪资范围</label>
                        <input type="text" id="job-salary" placeholder="8k-12k">
                    </div>
                </div>
                <div class="form-group">
                    <label>职位来源</label>
                    <select id="job-source">
                        <option value="手动添加">手动添加</option>
                        <option value="智联招聘">智联招聘</option>
                        <option value="前程无忧">前程无忧</option>
                        <option value="Boss直聘">Boss直聘</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>职位链接</label>
                    <input type="url" id="job-url" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>任职要求</label>
                    <textarea id="job-requirements" rows="4" placeholder="输入任职要求..."></textarea>
                </div>
                <div class="form-group">
                    <label>职位描述</label>
                    <textarea id="job-description" rows="4" placeholder="输入职位描述..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary btn-large">
                        <i class="fas fa-check"></i> 提交
                    </button>
                    <button type="button" class="btn-secondary btn-large close-add-modal">
                        <i class="fas fa-times"></i> 取消
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 长沙市医学检验招聘监测系统 | 每日中午12:00自动更新</p>
    </footer>

    <script src="client/js/script.js"></script>
</body>
</html>
